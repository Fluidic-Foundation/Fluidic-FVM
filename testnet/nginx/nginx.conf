events {
  worker_connections 4096;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format fluidic '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'rt=$request_time uct="$upstream_connect_time" '
                     'uht="$upstream_header_time" urt="$upstream_response_time"';

  access_log /var/log/nginx/access.log fluidic;
  error_log /var/log/nginx/error.log warn;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
  limit_req_zone $binary_remote_addr zone=faucet:10m rate=1r/m;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream mesh_nodes {
    # Fluidic testnet node now runs on a dedicated GCE VM in the GKE VPC.
    server 10.0.0.79:8080;
  }

  upstream faucet_service {
    server faucet:3000;
  }

  server {
    listen 80;
    server_name api.testnet.fluidic.foundation;

    client_max_body_size 1m;

    location /api/health {
      proxy_pass http://mesh_nodes;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ws {
      limit_req zone=api burst=100 nodelay;
      proxy_pass http://mesh_nodes;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      limit_req zone=api burst=100 nodelay;
      proxy_pass http://mesh_nodes;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /rpc {
      limit_req zone=api burst=100 nodelay;
      proxy_pass http://mesh_nodes;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /faucet {
      limit_req zone=faucet burst=5 nodelay;
      rewrite ^/faucet(/.*)$ $1 break;
      proxy_pass http://faucet_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      return 404;
    }
  }
}
