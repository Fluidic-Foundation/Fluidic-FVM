apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mesh-node
  namespace: fluidic-testnet
spec:
  serviceName: mesh-node
  replicas: 1
  selector:
    matchLabels:
      app: mesh-node
  template:
    metadata:
      labels:
        app: mesh-node
    spec:
      volumes:
        - name: data
          emptyDir: {}
      containers:
        - name: mesh-node
          image: us-central1-docker.pkg.dev/project-934c3e12-e0e7-4811-810/fluidic/mesh-node@sha256:2da00f433ba763d22e3c1d01e36215fa10700009f3b6017a3fd8f50c085accb5
          imagePullPolicy: Always
          ports:
            - name: gossip
              containerPort: 7000
            - name: api
              containerPort: 8080
          env:
            - name: OSCILLATOR_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: BIND_ADDR
              value: "0.0.0.0:7000"
            - name: API_PORT
              value: "8080"
            - name: SYNTHESIS_INTERVAL_MS
              value: "1000"
            - name: GENERATOR_INTERVAL_MS
              value: "1000"
            - name: SNAPSHOT_INTERVAL_MS
              value: "5000"
            - name: PEERS
              value: ""
            - name: FLUIDIC_DATA_DIR
              value: "/data"
            - name: RUST_LOG
              value: "info"
            - name: RUST_BACKTRACE
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 8Gi
          startupProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/health
              port: api
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: api
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: mesh-node
  namespace: fluidic-testnet
spec:
  selector:
    app: mesh-node
  ports:
    - name: gossip
      port: 7000
      targetPort: 7000
    - name: api
      port: 8080
      targetPort: 8080
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: mesh-node-api
  namespace: fluidic-testnet
spec:
  selector:
    app: mesh-node
  ports:
    - name: api
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: mesh-node-gossip
  namespace: fluidic-testnet
spec:
  selector:
    app: mesh-node
  ports:
    - name: gossip
      port: 7000
      targetPort: 7000
  type: LoadBalancer
