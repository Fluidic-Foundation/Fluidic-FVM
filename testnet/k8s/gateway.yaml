apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: fluidic-api-backend-config
  namespace: fluidic-testnet
spec:
  securityPolicy:
    name: fluidic-testnet-api-policy
  timeoutSec: 60
  connectionDraining:
    drainingTimeoutSec: 30
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /api/health
    port: 80
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: fluidic-api-cert
  namespace: fluidic-testnet
spec:
  domains:
    - api.testnet.fluidic.foundation
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fluidic-api-ingress
  namespace: fluidic-testnet
  annotations:
    kubernetes.io/ingress.class: gce
    kubernetes.io/ingress.global-static-ip-name: fluidic-testnet-api-ip
    networking.gke.io/managed-certificates: fluidic-api-cert
spec:
  rules:
    - host: api.testnet.fluidic.foundation
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-gateway
                port:
                  number: 80
