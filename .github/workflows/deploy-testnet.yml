name: Deploy Testnet

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "docker/**"
      - "testnet/**"
      - "dapp/**"
      - "landing/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

env:
  PROJECT_ID: project-934c3e12-e0e7-4811-810
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/project-934c3e12-e0e7-4811-810/fluidic
  GKE_CLUSTER: fluidic-testnet

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Rust tests
        run: cargo test --release

      - name: Build mesh_node
        run: cargo build --release --bin mesh_node

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.PROJECT_ID }}/locations/global/workloadIdentityPools/github/providers/github
          service_account: github-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: kubectl

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push images
        run: ./testnet/scripts/build-and-push.sh

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.REGION }}

      - name: Deploy to GKE
        run: ./testnet/scripts/deploy.sh

  deploy-static-sites:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build landing site
        run: |
          cd landing
          npm ci
          npm run build

      - name: Build dApp
        env:
          VITE_FLUIDIC_API: https://api.testnet.fluidic.foundation
          VITE_FLUIDIC_WS: wss://api.testnet.fluidic.foundation
        run: |
          cd dapp
          npm ci
          npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.PROJECT_ID }}/locations/global/workloadIdentityPools/github/providers/github
          service_account: github-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Upload landing site to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: landing/dist
          destination: fluidic-testnet-site
          parent: false

      - name: Upload dApp to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: dapp/dist
          destination: fluidic-testnet-dapp
          parent: false
